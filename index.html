<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storm Sail — AI Wettertransformation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:    #0a0e1a;
    --deep:    #111827;
    --surface: #1a2235;
    --panel:   #1f2d42;
    --border:  #2a3d5a;
    --accent:  #3b82f6;
    --accent2: #06b6d4;
    --storm:   #64748b;
    --sun:     #f59e0b;
    --text:    #e2e8f0;
    --muted:   #64748b;
    --danger:  #ef4444;
    --success: #22c55e;
  }

  html, body {
    min-height: 100vh;
    background: var(--navy);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
  }

  /* Animated sea background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% 100%, #0c1a2e 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 20% 80%, #0a1628 0%, transparent 60%),
      linear-gradient(180deg, #060912 0%, #0a0e1a 40%, #0d1520 100%);
    z-index: 0;
    pointer-events: none;
  }

  /* Subtle wave lines */
  body::after {
    content: '';
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 200px;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 18px,
      rgba(59,130,246,0.03) 18px,
      rgba(59,130,246,0.03) 19px
    );
    z-index: 0;
    pointer-events: none;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* Header */
  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 48px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .logo-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    letter-spacing: 4px;
    line-height: 1;
    background: linear-gradient(135deg, #e2e8f0 0%, #94a3b8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .logo-sub {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent2);
    font-weight: 500;
  }

  /* API Key section */
  .api-section {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .api-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .api-input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  #apiKey {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 36px 8px 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    width: 240px;
    outline: none;
    transition: border-color 0.2s;
  }

  #apiKey:focus { border-color: var(--accent); }
  #apiKey::placeholder { color: var(--muted); font-size: 12px; }

  .api-toggle {
    position: absolute;
    right: 10px;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    padding: 0;
    line-height: 1;
  }

  .api-status {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.3s;
    flex-shrink: 0;
  }
  .api-status.ok { background: var(--success); }

  /* Upload zone */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    background: var(--surface);
    position: relative;
    overflow: hidden;
    margin-bottom: 32px;
  }

  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: rgba(59,130,246,0.05);
  }

  .upload-zone.has-image {
    border-style: solid;
    border-color: var(--border);
    padding: 0;
  }

  .upload-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .upload-icon {
    font-size: 48px;
    margin-bottom: 12px;
    display: block;
  }

  .upload-text {
    font-size: 15px;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .upload-hint {
    font-size: 12px;
    color: var(--border);
  }

  #previewImg {
    width: 100%;
    max-height: 400px;
    object-fit: cover;
    border-radius: 14px;
    display: none;
  }

  .change-photo-btn {
    position: absolute;
    top: 12px;
    right: 12px;
    background: rgba(10,14,26,0.8);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 6px 12px;
    font-size: 12px;
    cursor: pointer;
    backdrop-filter: blur(8px);
    display: none;
    font-family: 'DM Sans', sans-serif;
    transition: background 0.2s;
  }

  .change-photo-btn:hover { background: rgba(59,130,246,0.2); }

  /* Controls grid */
  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 28px;
  }

  .control-group {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
  }

  .control-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
    display: block;
    font-weight: 500;
  }

  /* Sky options */
  .sky-options {
    display: flex;
    gap: 10px;
  }

  .sky-btn {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 10px;
    background: var(--panel);
    color: var(--text);
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .sky-btn:hover { border-color: var(--accent); }

  .sky-btn.active {
    border-color: var(--accent);
    background: rgba(59,130,246,0.12);
  }

  .sky-btn.active.sunny { border-color: var(--sun); background: rgba(245,158,11,0.1); }
  .sky-btn.active.stormy { border-color: var(--storm); background: rgba(100,116,139,0.15); }

  .sky-btn .sky-icon { font-size: 28px; display: block; margin-bottom: 6px; }
  .sky-btn .sky-name { font-size: 12px; font-weight: 500; }

  /* Wind slider */
  .wind-options {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .wind-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    background: var(--panel);
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
    text-align: left;
  }

  .wind-btn:hover { border-color: var(--accent); }

  .wind-btn.active {
    border-color: var(--accent2);
    background: rgba(6,182,212,0.1);
  }

  .wind-waves { font-size: 18px; letter-spacing: -2px; min-width: 56px; }
  .wind-info { display: flex; flex-direction: column; gap: 1px; }
  .wind-name { font-size: 13px; font-weight: 500; }
  .wind-desc { font-size: 11px; color: var(--muted); }



  /* Transform button */
  .transform-btn {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    border: none;
    border-radius: 14px;
    color: white;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 4px;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
    margin-bottom: 40px;
  }

  .transform-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(59,130,246,0.4);
  }

  .transform-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .transform-btn .btn-shimmer {
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    animation: shimmer 2s infinite;
  }

  @keyframes shimmer {
    to { left: 100%; }
  }

  /* Result section */
  .result-section {
    display: none;
    animation: fadeUp 0.5s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    font-weight: 500;
  }

  .compare-wrap {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }

  .compare-card {
    position: relative;
    border-radius: 14px;
    overflow: hidden;
    background: var(--surface);
    border: 1px solid var(--border);
  }

  .compare-card img {
    width: 100%;
    height: 280px;
    object-fit: cover;
    display: block;
  }

  .compare-tag {
    position: absolute;
    top: 12px;
    left: 12px;
    background: rgba(10,14,26,0.85);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    backdrop-filter: blur(8px);
    font-weight: 500;
  }

  .compare-tag.after { color: var(--accent2); border-color: var(--accent2); }

  /* Loading state */
  .loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(6,9,18,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
    backdrop-filter: blur(4px);
  }

  .loading-overlay.active { display: flex; }

  .loading-spinner {
    width: 56px; height: 56px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 4px;
    color: var(--muted);
  }

  .loading-sub {
    font-size: 13px;
    color: var(--muted);
  }

  /* Download button */
  .download-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    font-weight: 500;
  }

  .download-btn:hover {
    border-color: var(--accent);
    background: rgba(59,130,246,0.1);
  }

  /* Error toast */
  .error-toast {
    display: none;
    background: rgba(239,68,68,0.1);
    border: 1px solid var(--danger);
    border-radius: 10px;
    padding: 14px 18px;
    font-size: 13px;
    color: #fca5a5;
    margin-bottom: 16px;
    line-height: 1.5;
  }

  .error-toast.show { display: block; }

  /* Responsive */
  @media (max-width: 640px) {
    .controls { grid-template-columns: 1fr; }
    .compare-wrap { grid-template-columns: 1fr; }
    header { flex-direction: column; align-items: flex-start; gap: 16px; }
    .logo-title { font-size: 40px; }
    #apiKey { width: 200px; }
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">TRANSFORMING</div>
  <div class="loading-sub">KI verarbeitet dein Bild…</div>
</div>

<div class="app">

  <header>
    <div class="logo">
      <span class="logo-title">Storm Sail</span>
      <span class="logo-sub">KI Wettertransformation</span>
    </div>

  </header>

  <!-- Upload -->
  <div class="upload-zone" id="uploadZone"
    ondragover="event.preventDefault(); this.classList.add('drag-over')"
    ondragleave="this.classList.remove('drag-over')"
    ondrop="handleDrop(event)">
    <input type="file" accept="image/*" id="fileInput" onchange="handleFile(this.files[0])">
    <div id="uploadPlaceholder">
      <span class="upload-icon">⛵</span>
      <p class="upload-text">Segelbild hier ablegen oder klicken</p>
      <p class="upload-hint">JPG, PNG, WebP · max. 20 MB</p>
    </div>
    <img id="previewImg" alt="Vorschau">
    <button class="change-photo-btn" id="changeBtn" onclick="changePhoto(event)">↩ Anderes Bild</button>
    <div id="imgSizeInfo" style="position:absolute;bottom:10px;left:12px;font-size:11px;color:rgba(255,255,255,0.55);background:rgba(10,14,26,0.65);padding:3px 8px;border-radius:5px;pointer-events:none;"></div>
  </div>

  <!-- Controls -->
  <div class="controls">

    <div class="control-group">
      <span class="control-label">☁ Himmel</span>
      <div class="sky-options">
        <button class="sky-btn sunny active" id="sky-sunny" onclick="setSky('sunny')">
          <span class="sky-icon">☀️</span>
          <span class="sky-name">Blauer Himmel</span>
        </button>
        <button class="sky-btn stormy" id="sky-stormy" onclick="setSky('stormy')">
          <span class="sky-icon">🌩️</span>
          <span class="sky-name">Grauer Himmel</span>
        </button>
      </div>
    </div>

    <div class="control-group">
      <span class="control-label">🌊 Wind &amp; Wellen</span>
      <div class="wind-options">
        <button class="wind-btn active" id="wind-light" onclick="setWind('light')">
          <span class="wind-waves">〰</span>
          <span class="wind-info">
            <span class="wind-name">Wenig Wind</span>
            <span class="wind-desc">Ruhiges Wasser, leichte Brise</span>
          </span>
        </button>
        <button class="wind-btn" id="wind-medium" onclick="setWind('medium')">
          <span class="wind-waves">🌊🌊</span>
          <span class="wind-info">
            <span class="wind-name">Mittlerer Wind</span>
            <span class="wind-desc">Wellen, Schaumkronen</span>
          </span>
        </button>
        <button class="wind-btn" id="wind-heavy" onclick="setWind('heavy')">
          <span class="wind-waves">🌊🌊🌊</span>
          <span class="wind-info">
            <span class="wind-name">Sturm</span>
            <span class="wind-desc">Hohe Wellen, Gischt, Blitz</span>
          </span>
        </button>
      </div>
    </div>

  </div>



  <!-- Error -->
  <div class="error-toast" id="errorToast"></div>

  <!-- Transform -->
  <button class="transform-btn" id="transformBtn" onclick="transform()" disabled>
    <span class="btn-shimmer"></span>
    ⚡ Bild transformieren
  </button>

  <!-- Result -->
  <div class="result-section" id="resultSection">
    <p class="result-label">Ergebnis — Vorher / Nachher</p>
    <div class="compare-wrap">
      <div class="compare-card">
        <img id="beforeImg" alt="Vorher">
        <span class="compare-tag">Vorher</span>
      </div>
      <div class="compare-card">
        <img id="afterImg" alt="Nachher">
        <span class="compare-tag after">KI-Transformation</span>
      </div>
    </div>
    <div style="display:flex; align-items:center; justify-content:space-between; margin-top: 16px; flex-wrap: wrap; gap: 12px;">
      <a class="download-btn" id="downloadBtn" download="storm-sail-transformation.png">
        ⬇ Bild herunterladen
      </a>
      <div id="costDisplay" style="font-size:12px; color:var(--muted); text-align:right; line-height:1.7;">
        <span id="costCount"></span>
      </div>
    </div>
  </div>

</div>

<script>
  let currentSky = 'sunny';
  let currentWind = 'light';
  let currentImageBase64 = null;
  let currentImageMime = 'image/jpeg';
  let apiVisible = false;

  const COST_PER_IMAGE = 0.067;
  let generationCount = parseInt(localStorage.getItem('ss_count') || '0');
  let totalCost = parseFloat(localStorage.getItem('ss_cost') || '0');

  function updateCostDisplay() {
    const costEur = (totalCost * 0.92).toFixed(3);
    document.getElementById('costCount').innerHTML =
      `Diese Sitzung: <strong style="color:var(--text)">${generationCount} Bild${generationCount !== 1 ? 'er' : ''}</strong> generiert &nbsp;&nbsp;&nbsp;·&nbsp;&nbsp;&nbsp; ca. <strong style="color:var(--text)">$${totalCost.toFixed(3)}</strong> (~€${costEur}) &nbsp;&nbsp;&nbsp;·&nbsp;&nbsp;&nbsp; <span style="opacity:0.5">~$0.067 / Bild</span>`;
  }

  const prompts = {
    sunny: {
      light: 'Edit only the sky and water in this sailing photo. IMPORTANT: Do NOT change any people — preserve every face, skin, hair, and clothing exactly as-is, pixel-perfect. Do NOT change the boat hull, boat name, sail markings, or any text on the boat. Only replace the sky and water: bright blue sky with a few white clouds, calm and gently rippling water, light breeze, peaceful sunny atmosphere. Photorealistic.',
      medium: 'Edit only the sky and water in this sailing photo. IMPORTANT: Do NOT change any people — preserve every face, skin, hair, and clothing exactly as-is, pixel-perfect. Do NOT change the boat hull, boat name, sail markings, or any text on the boat. Only replace the sky and water: mostly blue sky with cumulus clouds, choppy water with small whitecaps, moderate wind, dynamic sailing conditions. Photorealistic.',
      heavy: 'Edit only the sky and water in this sailing photo. IMPORTANT: Do NOT change any people — preserve every face, skin, hair, and clothing exactly as-is, pixel-perfect. Do NOT change the boat hull, boat name, sail markings, or any text on the boat. Only replace the sky and water: dramatic blue sky darkening at the horizon, large rolling waves with whitecaps, spray flying, intense conditions. Photorealistic.'
    },
    stormy: {
      light: 'Edit only the sky and water in this sailing photo. IMPORTANT: Do NOT change any people — preserve every face, skin, hair, and clothing exactly as-is, pixel-perfect. Do NOT change the boat hull, boat name, sail markings, or any text on the boat. Only replace the sky and water: overcast grey sky, calm metallic-grey water, light wind, moody and atmospheric. Photorealistic.',
      medium: 'Edit only the sky and water in this sailing photo. IMPORTANT: Do NOT change any people — preserve every face, skin, hair, and clothing exactly as-is, pixel-perfect. Do NOT change the boat hull, boat name, sail markings, or any text on the boat. Only replace the sky and water: heavy dark grey storm clouds, choppy grey-green waves with whitecaps, strong wind, ominous atmosphere. Photorealistic.',
      heavy: 'Edit only the sky and water in this sailing photo. IMPORTANT: Do NOT change any people — preserve every face, skin, hair, and clothing exactly as-is, pixel-perfect. Do NOT change the boat hull, boat name, sail markings, or any text on the boat. Only replace the sky and water: pitch black storm clouds, lightning bolts in background, enormous crashing waves, hurricane-force winds, spray and foam everywhere. Photorealistic, cinematic, dramatic.'
    }
  };

  function setSky(val) {
    currentSky = val;
    document.getElementById('sky-sunny').classList.remove('active');
    document.getElementById('sky-stormy').classList.remove('active');
    document.getElementById('sky-' + val).classList.add('active');
  }

  function setWind(val) {
    currentWind = val;
    ['light','medium','heavy'].forEach(w => document.getElementById('wind-'+w).classList.remove('active'));
    document.getElementById('wind-' + val).classList.add('active');
  }

  function handleDrop(e) {
    e.preventDefault();
    document.getElementById('uploadZone').classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) handleFile(file);
  }

  function handleFile(file) {
    if (!file) return;
    currentImageMime = 'image/jpeg';

    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        // Resize to max 1536px on longest side
        const MAX = 1536;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w >= h) { h = Math.round(h * MAX / w); w = MAX; }
          else        { w = Math.round(w * MAX / h); h = MAX; }
        }

        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);

        const dataUrl = canvas.toDataURL('image/jpeg', 0.88);
        currentImageBase64 = dataUrl.split(',')[1];

        // Size info for user
        const kb = Math.round(currentImageBase64.length * 0.75 / 1024);
        document.getElementById('imgSizeInfo').textContent = `${w}×${h}px · ~${kb} KB · automatisch verkleinert`;

        document.getElementById('previewImg').src = dataUrl;
        document.getElementById('previewImg').style.display = 'block';
        document.getElementById('uploadPlaceholder').style.display = 'none';
        document.getElementById('changeBtn').style.display = 'block';
        document.getElementById('uploadZone').classList.add('has-image');
        document.getElementById('uploadZone').style.cursor = 'default';

        checkReady();
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function changePhoto(e) {
    e.stopPropagation();
    currentImageBase64 = null;
    document.getElementById('previewImg').style.display = 'none';
    document.getElementById('uploadPlaceholder').style.display = 'block';
    document.getElementById('changeBtn').style.display = 'none';
    document.getElementById('imgSizeInfo').textContent = '';
    document.getElementById('uploadZone').classList.remove('has-image');
    document.getElementById('uploadZone').style.cursor = 'pointer';
    document.getElementById('fileInput').value = '';
    document.getElementById('resultSection').style.display = 'none';
    checkReady();
  }

  function checkApiKey() {}

  function checkReady() {
    document.getElementById('transformBtn').disabled = !currentImageBase64;
  }

  function showError(msg) {
    const el = document.getElementById('errorToast');
    el.style.whiteSpace = 'pre-wrap';
    el.style.fontFamily = 'monospace';
    el.style.fontSize = '11px';
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 30000);
  }

  async function transform() {
    const apiKey = document.getElementById('apiKey').value.trim();
    if (!apiKey || !currentImageBase64) return;

    document.getElementById('errorToast').classList.remove('show');
    document.getElementById('loadingOverlay').classList.add('active');
    document.getElementById('transformBtn').disabled = true;

    const prompt = prompts[currentSky][currentWind];

    try {
      document.querySelector('.loading-sub').textContent = 'KI verarbeitet dein Bild…';

      const response = await fetch('/api/transform', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          imageBase64: currentImageBase64,
          imageMime: currentImageMime,
          prompt: prompt
        })
      });

      const data = await response.json();

      if (!response.ok) {
        const code = data?.code || response.status;
        if (code === 429 || code === 503) throw new Error(`Rate Limit — bitte 2 Minuten warten.`);
        throw new Error(data?.error || `Fehler ${code}`);
      }

      const { imageData, imageMime } = data;

      const resultUrl = `data:${imageMime};base64,${imageData}`;
      const originalUrl = `data:${currentImageMime};base64,${currentImageBase64}`;

      document.getElementById('beforeImg').src = originalUrl;
      document.getElementById('afterImg').src = resultUrl;
      document.getElementById('downloadBtn').href = resultUrl;

      generationCount++;
      totalCost += COST_PER_IMAGE;
      localStorage.setItem('ss_count', generationCount);
      localStorage.setItem('ss_cost', totalCost.toFixed(4));
      updateCostDisplay();

      document.getElementById('resultSection').style.display = 'block';
      document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'start' });

    } catch (err) {
      showError('⚠ ' + err.message);
    } finally {
      document.getElementById('loadingOverlay').classList.remove('active');
      document.getElementById('transformBtn').disabled = false;
      checkReady();
    }
  }
  checkReady();
  if (generationCount > 0) updateCostDisplay();

</script>
</body>
</html>
